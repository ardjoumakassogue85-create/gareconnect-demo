# fly.toml app configuration file generated for gareconnect-demo-cool-headland-7865 on 2026-07-10T19:15:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gareconnect-demo-cool-headland-7865'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Garde 1 machine toujours allumee => pas de cold-start (demo/jury reactive).
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 1 Go : la JVM Spring Boot demarre normalement (512 Mo => crash-loop OOM).
  memory = '1gb'
